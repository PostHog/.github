name: Notify Slack - Release Approval

on:
  workflow_call:
    inputs:
      slack_channel_id:
        required: true
        type: string
      slack_user_group_id:
        required: true
        type: string
      checkout_repository:
        description: "Checkout the caller repository before building the compare URL."
        required: false
        type: boolean
        default: true
      tag_pattern:
        description: "Tag glob used for the compare base."
        required: false
        type: string
        default: "*"
      tag_sort:
        description: "Tag sort mode: creatordate or version."
        required: false
        type: string
        default: "creatordate"
    secrets:
      slack_bot_token:
        required: true
      posthog_project_api_key:
        required: true
    outputs:
      slack_ts:
        description: "Slack message timestamp for threading replies"
        value: ${{ jobs.notify.outputs.slack_ts }}

jobs:
  notify:
    runs-on: ubuntu-latest
    outputs:
      slack_ts: ${{ steps.notify.outputs.ts }}
    steps:
      - name: Checkout repository
        if: inputs.checkout_repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get info
        id: get-info
        shell: bash
        env:
          CHECKOUT_REPOSITORY: ${{ inputs.checkout_repository }}
          DEFAULT_BRANCH_FALLBACK: ${{ github.event.repository.default_branch }}
          REPOSITORY: ${{ github.repository }}
          TAG_PATTERN: ${{ inputs.tag_pattern }}
          TAG_SORT: ${{ inputs.tag_sort }}
        run: |
          set -euo pipefail

          if [ "$CHECKOUT_REPOSITORY" = "true" ]; then
            # Fetch all tags
            git fetch --tags --force

            # Get the most recent tag (sorted by date, not version)
            # Note: Use read instead of piping to head to avoid SIGPIPE (exit 141)
            ALL_TAGS=$(git tag --sort=-creatordate)
            read -r LATEST_TAG <<< "$ALL_TAGS"

            if [ -z "$LATEST_TAG" ]; then
              echo "No tags found, using initial commit"
              LATEST_TAG=$(git rev-list --max-parents=0 HEAD)
            fi

            DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@' | tr -d '\n')
          else
            if [ "$TAG_SORT" != "version" ]; then
              echo "::error::checkout_repository=false requires tag_sort=version"
              exit 1
            fi

            repo_url="https://github.com/${REPOSITORY}.git"
            tag_glob="${TAG_PATTERN:-*}"
            tag_ref_pattern="refs/tags/$tag_glob"
            LATEST_TAG=$(
              git ls-remote --tags --refs --sort=-version:refname "$repo_url" "$tag_ref_pattern" |
                awk -F 'refs/tags/' 'NR == 1 { print $2 }'
            )

            if [ -z "$LATEST_TAG" ]; then
              echo "No tags found for pattern '$tag_glob', using HEAD"
              LATEST_TAG="HEAD"
            fi

            DEFAULT_BRANCH="${DEFAULT_BRANCH_FALLBACK:-}"
            if [ -z "$DEFAULT_BRANCH" ]; then
              DEFAULT_BRANCH=$(
                git ls-remote --symref "$repo_url" HEAD |
                  awk '/^ref:/ { sub("refs/heads/", "", $2); print $2; exit }'
              )
            fi
          fi

          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          if [ -z "$DEFAULT_BRANCH" ]; then
            DEFAULT_BRANCH="main"
          fi
          echo "default_branch=$DEFAULT_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Send Slack notification
        id: notify
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        continue-on-error: true
        with:
          method: chat.postMessage
          token: ${{ secrets.slack_bot_token }}
          payload: |
            {
                "channel": "${{ inputs.slack_channel_id }}",
                "text": "🚀 Release Approval Needed for ${{ github.repository }}",
                "blocks": [
                {
                    "type": "header",
                    "text": {
                    "type": "plain_text",
                    "text": "🚀 Release Approval Needed - ${{ github.repository }}",
                    "emoji": true
                    }
                },
                {
                    "type": "section",
                    "text": {
                    "type": "mrkdwn",
                    "text": "A new release is ready for approval in the `${{ github.repository }}` repository."
                    }
                },
                {
                    "type": "section",
                    "fields": [
                    {
                        "type": "mrkdwn",
                        "text": "*Repository:*\n<https://github.com/${{ github.repository }}|${{ github.repository }}>"
                    },
                    ]
                },
                {
                    "type": "section",
                    "text": {
                    "type": "mrkdwn",
                    "text": "<!subteam^${{ inputs.slack_user_group_id }}|@support-hero-client-libraries> Please review and approve the release."
                    }
                },
                {
                    "type": "actions",
                    "elements": [
                    {
                        "type": "button",
                        "text": {
                        "type": "plain_text",
                        "text": "View Diff on GitHub",
                        "emoji": true
                        },
                        "url": "https://github.com/${{ github.repository }}/compare/${{ steps.get-info.outputs.latest_tag }}...${{ steps.get-info.outputs.default_branch }}"
                    },
                    {
                        "type": "button",
                        "text": {
                        "type": "plain_text",
                        "text": "Approve/Reject on GitHub",
                        "emoji": true
                        },
                        "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                        "style": "primary"
                    }
                    ]
                }
                ]
            }

      - name: Send Slack failure event to PostHog
        if: ${{ steps.notify.outcome == 'failure' }}
        uses: PostHog/posthog-github-action@eea1405eeb2d1d2259f0ee0b44d7b152869e6840 # v1.1.1
        with:
          posthog-token: "${{ secrets.posthog_project_api_key }}"
          event: "sdk-slack-notification-failure"
          properties: >-
            {
                "step": "notify-approval-needed",
                "workflow": "release",
                "repository": "${{ github.repository }}",
                "run_id": "${{ github.run_id }}",
                "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
